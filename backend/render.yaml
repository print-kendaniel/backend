services:
  - type: web
    name: trustlink-ai-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://frontend-steel-nine-yi8dnza11m.vercel.app,http://localhost:3000
      - key: APP_ENV
        value: production
